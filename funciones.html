<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MetraPro Niveles</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
<script>
Office.onReady(() => {});

const NIVELES = {
    1: { color: '#E81123', size: 13, bold: true,  italic: false },
    2: { color: '#16C60C', size: 12, bold: true,  italic: false },
    3: { color: '#0078D7', size: 12, bold: true,  italic: false },
    4: { color: '#FF8C00', size: 11, bold: true,  italic: false },
    5: { color: '#00B7C3', size: 11, bold: true,  italic: false },
    6: { color: '#E3008C', size: 10, bold: true,  italic: false },
    7: { color: '#00BCF2', size: 10, bold: false, italic: false },
    8: { color: '#D1D5DB', size: 10, bold: false, italic: false },
    9: { color: '#737373', size: 9,  bold: false, italic: true  }
};

function notificarError(mensaje) {
    try {
        Office.context.ui.displayDialogAsync(
            'data:text/html,' + encodeURIComponent(`
                <html><head><style>
                    body{font-family:'Segoe UI',sans-serif;padding:18px;background:#FAFAF7;margin:0;}
                    .icon{font-size:24px;color:#E81123;}
                    h2{font-size:13px;color:#2C2C2A;margin:6px 0;}
                    p{font-size:11px;color:#5F5E5A;line-height:1.5;}
                    button{background:#0078D7;color:white;border:none;padding:6px 14px;border-radius:3px;font-size:11px;cursor:pointer;margin-top:10px;}
                </style></head>
                <body>
                    <div class="icon">&#9888;</div>
                    <h2>MetraPro</h2>
                    <p>${mensaje}</p>
                    <button onclick="Office.context.ui.messageParent('close')">Entendido</button>
                    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"><\/script>
                </body></html>
            `),
            { height: 25, width: 22, displayInIframe: true },
            (result) => {
                if (result.value) {
                    result.value.addEventHandler(Office.EventType.DialogMessageReceived, () => {
                        result.value.close();
                    });
                }
            }
        );
    } catch (e) {
        console.error(mensaje);
    }
}

async function aplicarNivel(numero, event) {
    try {
        const config = NIVELES[numero];
        if (!config) {
            notificarError('Nivel ' + numero + ' no definido.');
            event.completed();
            return;
        }
        await Excel.run(async (context) => {
            const sheet = context.workbook.worksheets.getActiveWorksheet();
            const cell = context.workbook.getActiveCell();
            cell.load('rowIndex');
            await context.sync();
            const r = cell.rowIndex + 1;
            if (r < 1) {
                notificarError('Selecciona una fila válida primero.');
                event.completed();
                return;
            }
            const rango = sheet.getRange(`C${r}:D${r}`);
            rango.format.font.color = config.color;
            rango.format.font.size = config.size;
            rango.format.font.bold = config.bold;
            rango.format.font.italic = config.italic;
            await context.sync();
        });
    } catch (err) {
        console.error(err);
        notificarError('No se pudo aplicar el nivel: ' + err.message);
    } finally {
        event.completed();
    }
}

async function nivel1(event) { return aplicarNivel(1, event); }
async function nivel2(event) { return aplicarNivel(2, event); }
async function nivel3(event) { return aplicarNivel(3, event); }
async function nivel4(event) { return aplicarNivel(4, event); }
async function nivel5(event) { return aplicarNivel(5, event); }
async function nivel6(event) { return aplicarNivel(6, event); }
async function nivel7(event) { return aplicarNivel(7, event); }
async function nivel8(event) { return aplicarNivel(8, event); }
async function nivel9(event) { return aplicarNivel(9, event); }

Office.actions.associate('nivel1', nivel1);
Office.actions.associate('nivel2', nivel2);
Office.actions.associate('nivel3', nivel3);
Office.actions.associate('nivel4', nivel4);
Office.actions.associate('nivel5', nivel5);
Office.actions.associate('nivel6', nivel6);
Office.actions.associate('nivel7', nivel7);
Office.actions.associate('nivel8', nivel8);
Office.actions.associate('nivel9', nivel9);
</script>
</body>
</html>
