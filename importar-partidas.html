<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetraPro · Importador</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #FAFAF7;
            color: #2C2C2A;
            font-size: 12px;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0078D7 0%, #00B7C3 100%);
            color: white;
            padding: 12px 14px;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .header p {
            font-size: 10px;
            opacity: 0.9;
        }
        .header .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 1px 7px;
            border-radius: 8px;
            font-size: 10px;
            margin-top: 5px;
            font-weight: 500;
        }
        .seccion-titulo {
            font-size: 9px;
            color: #888780;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 14px 4px;
            background: white;
        }
        .especialidades {
            background: white;
            padding: 0 10px 8px;
            border-bottom: 0.5px solid #E5E3DC;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }
        .esp {
            padding: 6px 8px;
            border: 1px solid #D3D1C7;
            border-radius: 4px;
            text-align: center;
            font-size: 11px;
            font-weight: 500;
            color: #5F5E5A;
            background: #FAFAF7;
            cursor: pointer;
        }
        .esp.activa {
            border: 1.5px solid #0078D7;
            background: #E6F1FB;
            color: #0C447C;
            font-weight: 600;
        }
        .esp.deshabilitada {
            color: #B4B2A9;
            background: #F5F4EE;
            cursor: not-allowed;
            font-weight: 400;
        }
        .esp-tag {
            font-size: 8px;
            display: block;
            opacity: 0.7;
            margin-top: 1px;
        }
        .controles {
            background: white;
            padding: 8px 12px;
            border-bottom: 0.5px solid #E5E3DC;
        }
        .search-wrap {
            position: relative;
        }
        .search-wrap input {
            width: 100%;
            padding: 6px 30px 6px 28px;
            border: 1px solid #D3D1C7;
            border-radius: 4px;
            font-family: inherit;
            font-size: 11px;
            background: white;
        }
        .search-wrap input:focus {
            outline: none;
            border-color: #0078D7;
            box-shadow: 0 0 0 2px rgba(0, 120, 215, 0.1);
        }
        .search-wrap::before {
            content: "";
            position: absolute;
            left: 9px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border: 1.5px solid #888780;
            border-radius: 50%;
        }
        .search-wrap::after {
            content: "";
            position: absolute;
            left: 17px;
            top: 18px;
            width: 5px;
            height: 1.5px;
            background: #888780;
            transform: rotate(45deg);
        }
        .btn-clear {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #888780;
            cursor: pointer;
            font-size: 13px;
            display: none;
            width: 18px;
            height: 18px;
            line-height: 18px;
            border-radius: 50%;
        }
        .btn-clear:hover {
            background: #F1EFE8;
            color: #2C2C2A;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 10px;
            color: #5F5E5A;
        }
        .toolbar a {
            color: #0078D7;
            cursor: pointer;
            font-weight: 500;
        }
        .toolbar a:hover { text-decoration: underline; }
        .lista {
            flex: 1;
            overflow-y: auto;
            background: white;
            padding: 4px 0;
        }
        .nodo {
            display: flex;
            align-items: center;
            padding: 3px 4px 3px 0;
            cursor: pointer;
            transition: background 0.1s;
            font-family: 'Consolas', 'Courier New', monospace;
            user-select: none;
        }
        .nodo:hover { background: #FAFAF7; }
        .nodo.selected { background: #FFF8E1; }
        .nodo.match { background: #E6F1FB; }
        .nodo .toggle {
            width: 18px;
            text-align: center;
            font-size: 9px;
            color: #5F5E5A;
            flex-shrink: 0;
        }
        .nodo .toggle.empty { visibility: hidden; }
        .nodo input[type="checkbox"] {
            margin: 0 6px 0 0;
            flex-shrink: 0;
            width: 13px;
            height: 13px;
            accent-color: #0078D7;
            cursor: pointer;
        }
        .nodo input[type="checkbox"].partial {
            opacity: 0.6;
        }
        .nodo .codigo {
            font-size: 11px;
            color: #5F5E5A;
            margin-right: 8px;
            flex-shrink: 0;
            min-width: 70px;
        }
        .nodo .descripcion {
            font-size: 11px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nodo[data-nivel="1"] .codigo,
        .nodo[data-nivel="1"] .descripcion {
            color: #E81123;
            font-weight: 700;
            font-size: 12px;
        }
        .nodo[data-nivel="2"] .codigo,
        .nodo[data-nivel="2"] .descripcion {
            color: #16C60C;
            font-weight: 700;
        }
        .nodo[data-nivel="3"] .codigo,
        .nodo[data-nivel="3"] .descripcion {
            color: #0078D7;
            font-weight: 700;
        }
        .nodo[data-nivel="4"] .codigo,
        .nodo[data-nivel="4"] .descripcion {
            color: #FF8C00;
            font-weight: 600;
        }
        .nodo[data-nivel="5"] .codigo,
        .nodo[data-nivel="5"] .descripcion {
            color: #00B7C3;
            font-weight: 600;
        }
        .nodo .nivel-badge {
            font-size: 8px;
            padding: 1px 4px;
            border-radius: 6px;
            font-weight: 600;
            color: white;
            margin-left: 6px;
            flex-shrink: 0;
        }
        .nodo .unidad-badge {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 2px;
            font-weight: 600;
            margin-left: 6px;
            flex-shrink: 0;
        }
        .u-m3 { background: #FAEEDA; color: #854F0B; }
        .u-m2 { background: #E1F5EE; color: #085041; }
        .u-m { background: #E6F1FB; color: #0C447C; }
        .u-kg { background: #FAECE7; color: #993C1D; }
        .u-und { background: #EEEDFE; color: #3C3489; }
        .u-glb { background: #F1EFE8; color: #5F5E5A; }
        .footer {
            padding: 10px 12px;
            background: #F1EFE8;
            border-top: 0.5px solid #D3D1C7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .footer-info {
            font-size: 11px;
            color: #5F5E5A;
        }
        .footer-info strong {
            color: #0078D7;
            font-size: 13px;
        }
        .btn-primary {
            padding: 7px 14px;
            background: #0078D7;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-primary:hover { background: #0c5ca8; }
        .btn-primary:disabled {
            background: #B4B2A9;
            cursor: not-allowed;
        }
        .loading {
            padding: 30px 20px;
            text-align: center;
            color: #888780;
            font-size: 11px;
        }
        .error {
            padding: 12px;
            margin: 10px;
            background: #FCE8E6;
            border: 1px solid #F5C6CB;
            color: #B71C1C;
            border-radius: 4px;
            font-size: 11px;
        }
        .toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: #1B5E20;
            color: white;
            padding: 7px 14px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 500;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.visible { opacity: 1; }
        .toast.error { background: #B71C1C; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Importar partidas</h1>
        <p>Banco oficial · Norma RD 073-2010</p>
        <span class="badge" id="versionBadge">cargando...</span>
    </div>

    <div class="seccion-titulo">Especialidad</div>
    <div class="especialidades">
        <div class="esp activa">Estructuras</div>
        <div class="esp deshabilitada">Arquitectura<span class="esp-tag">próximamente</span></div>
        <div class="esp deshabilitada">I. Sanitarias<span class="esp-tag">próximamente</span></div>
        <div class="esp deshabilitada">I. Eléctricas<span class="esp-tag">próximamente</span></div>
    </div>

    <div class="controles" id="controles" style="display: none;">
        <div class="search-wrap">
            <input type="text" id="busqueda" placeholder="Buscar... (zapata, encofrado, fc=210)" />
            <button class="btn-clear" id="btnClear" title="Limpiar">×</button>
        </div>
        <div class="toolbar">
            <span><span id="totalSelec">0</span> seleccionados</span>
            <span><a id="lnkExpandir">Expandir todo</a> · <a id="lnkColapsar">Colapsar todo</a></span>
        </div>
    </div>

    <div class="lista" id="lista">
        <div class="loading">Cargando base de datos...</div>
    </div>

    <div class="footer">
        <div class="footer-info">
            <strong id="seleccionadas">0</strong> elementos a importar
        </div>
        <button class="btn-primary" id="btnImportar" disabled>Importar</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const JSON_URL = 'https://marcelarojasinfantes-spec.github.io/metrapro-zapatas/partidas-estructuras.json';

        const NIVELES_FORMATO = {
            1: { color: '#E81123', size: 13, bold: true,  italic: false },
            2: { color: '#16C60C', size: 12, bold: true,  italic: false },
            3: { color: '#0078D7', size: 12, bold: true,  italic: false },
            4: { color: '#FF8C00', size: 11, bold: true,  italic: false },
            5: { color: '#00B7C3', size: 11, bold: true,  italic: false },
            6: { color: '#E3008C', size: 10, bold: true,  italic: false },
            7: { color: '#00BCF2', size: 10, bold: false, italic: false },
            8: { color: '#737373', size: 10, bold: false, italic: false },
            9: { color: '#374151', size: 9,  bold: false, italic: true  }
        };

        let baseDatos = null;
        let arbolNodos = [];
        let nodoIndex = {};
        let seleccionadas = new Set();
        let expandidos = new Set();
        let filtroBusqueda = '';

        Office.onReady(() => {
            cargarBaseDatos();
            
            document.getElementById('busqueda').addEventListener('input', (e) => {
                filtroBusqueda = e.target.value.toLowerCase().trim();
                document.getElementById('btnClear').style.display = filtroBusqueda ? 'block' : 'none';
                if (filtroBusqueda) {
                    expandirCoincidentes();
                }
                renderLista();
            });

            document.getElementById('btnClear').addEventListener('click', () => {
                document.getElementById('busqueda').value = '';
                filtroBusqueda = '';
                document.getElementById('btnClear').style.display = 'none';
                renderLista();
            });

            document.getElementById('lnkExpandir').addEventListener('click', () => {
                arbolNodos.forEach(n => { if (n.hijos.length > 0) expandidos.add(n.codigo); });
                renderLista();
            });

            document.getElementById('lnkColapsar').addEventListener('click', () => {
                expandidos.clear();
                arbolNodos.filter(n => n.nivel === 1).forEach(n => expandidos.add(n.codigo));
                renderLista();
            });

            document.getElementById('btnImportar').addEventListener('click', importar);
        });

        async function cargarBaseDatos() {
            try {
                const res = await fetch(JSON_URL + '?t=' + Date.now());
                if (!res.ok) throw new Error('No se pudo descargar el JSON');
                baseDatos = await res.json();
                
                document.getElementById('versionBadge').textContent = `v${baseDatos.version} · ${baseDatos.elementos.length} elementos`;
                document.getElementById('controles').style.display = 'block';
                
                construirArbol();
                
                arbolNodos.filter(n => n.nivel === 1).forEach(n => expandidos.add(n.codigo));
                
                renderLista();
            } catch (err) {
                document.getElementById('lista').innerHTML = `<div class="error">Error: ${err.message}</div>`;
            }
        }

        function calcularNivel(codigo) {
            const partes = codigo.replace(/^OE\./, '').split('.').filter(p => p.trim() !== '');
            return partes.length;
        }

        function construirArbol() {
            arbolNodos = [];
            nodoIndex = {};

            baseDatos.elementos.forEach(e => {
                const nivel = calcularNivel(e.codigo);
                const nodo = {
                    codigo: e.codigo,
                    descripcion: e.descripcion,
                    unidad: e.unidad,
                    tipo_calculo: e.tipo_calculo,
                    nivel: nivel,
                    hijos: [],
                    padre: null
                };
                arbolNodos.push(nodo);
                nodoIndex[e.codigo] = nodo;
            });

            arbolNodos.forEach(nodo => {
                const partes = nodo.codigo.split('.');
                if (partes.length > 1) {
                    const codPadre = partes.slice(0, -1).join('.');
                    if (nodoIndex[codPadre]) {
                        nodo.padre = codPadre;
                        nodoIndex[codPadre].hijos.push(nodo.codigo);
                    }
                }
            });
        }

        function expandirCoincidentes() {
            arbolNodos.forEach(nodo => {
                if (coincide(nodo)) {
                    let cur = nodo.padre;
                    while (cur) {
                        expandidos.add(cur);
                        cur = nodoIndex[cur] ? nodoIndex[cur].padre : null;
                    }
                }
            });
        }

        function coincide(nodo) {
            if (!filtroBusqueda) return true;
            const haystack = (nodo.descripcion + ' ' + nodo.codigo).toLowerCase();
            return haystack.includes(filtroBusqueda);
        }

        function nodoOSusHijosCoinciden(nodo) {
            if (coincide(nodo)) return true;
            return nodo.hijos.some(c => nodoOSusHijosCoinciden(nodoIndex[c]));
        }

        function getUnidadClass(und) {
            if (und === 'm³') return 'u-m3';
            if (und === 'm²') return 'u-m2';
            if (und === 'm') return 'u-m';
            if (und === 'kg') return 'u-kg';
            if (und === 'und' || und === 'mes') return 'u-und';
            return 'u-glb';
        }

        function getEstadoCheck(nodo) {
            if (nodo.hijos.length === 0) {
                return seleccionadas.has(nodo.codigo) ? 'todos' : 'ninguno';
            }
            
            let conMarca = 0;
            let total = 0;
            
            const recorrer = (c) => {
                const hijo = nodoIndex[c];
                if (hijo.hijos.length === 0) {
                    total++;
                    if (seleccionadas.has(hijo.codigo)) conMarca++;
                } else {
                    hijo.hijos.forEach(recorrer);
                }
            };
            nodo.hijos.forEach(recorrer);
            
            if (conMarca === 0) return 'ninguno';
            if (conMarca === total) return 'todos';
            return 'parcial';
        }

        function toggleSeleccion(nodo) {
            const estado = getEstadoCheck(nodo);
            const seleccionar = (estado !== 'todos');
            
            const recorrer = (cod) => {
                const n = nodoIndex[cod];
                if (n.hijos.length === 0) {
                    if (seleccionar) seleccionadas.add(cod);
                    else seleccionadas.delete(cod);
                } else {
                    n.hijos.forEach(recorrer);
                }
            };
            
            if (nodo.hijos.length === 0) {
                if (seleccionar) seleccionadas.add(nodo.codigo);
                else seleccionadas.delete(nodo.codigo);
            } else {
                nodo.hijos.forEach(recorrer);
            }
            
            renderLista();
        }

        function toggleExpand(codigo) {
            if (expandidos.has(codigo)) expandidos.delete(codigo);
            else expandidos.add(codigo);
            renderLista();
        }

        function renderLista() {
            const cont = document.getElementById('lista');
            cont.innerHTML = '';
            
            const raices = arbolNodos.filter(n => n.padre === null);
            
            const renderNodo = (nodo, profundidad) => {
                if (filtroBusqueda && !nodoOSusHijosCoinciden(nodo)) return;
                
                const div = document.createElement('div');
                div.className = 'nodo';
                if (filtroBusqueda && coincide(nodo)) div.classList.add('match');
                div.dataset.nivel = nodo.nivel;
                
                const indent = document.createElement('div');
                indent.style.width = (profundidad * 12) + 'px';
                indent.style.flexShrink = '0';
                div.appendChild(indent);
                
                const toggle = document.createElement('div');
                toggle.className = 'toggle' + (nodo.hijos.length === 0 ? ' empty' : '');
                toggle.textContent = nodo.hijos.length === 0 ? '' : (expandidos.has(nodo.codigo) ? '▾' : '▸');
                if (nodo.hijos.length > 0) {
                    toggle.onclick = (e) => {
                        e.stopPropagation();
                        toggleExpand(nodo.codigo);
                    };
                }
                div.appendChild(toggle);
                
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                const estado = getEstadoCheck(nodo);
                cb.checked = (estado === 'todos');
                cb.indeterminate = (estado === 'parcial');
                if (estado === 'parcial') cb.classList.add('partial');
                cb.onclick = (e) => {
                    e.stopPropagation();
                    toggleSeleccion(nodo);
                };
                div.appendChild(cb);
                
                const cod = document.createElement('div');
                cod.className = 'codigo';
                cod.textContent = nodo.codigo.replace(/^OE\./, '');
                div.appendChild(cod);
                
                const desc = document.createElement('div');
                desc.className = 'descripcion';
                desc.textContent = nodo.descripcion;
                div.appendChild(desc);
                
                if (nodo.unidad) {
                    const u = document.createElement('span');
                    u.className = 'unidad-badge ' + getUnidadClass(nodo.unidad);
                    u.textContent = nodo.unidad;
                    div.appendChild(u);
                }
                
                const formato = NIVELES_FORMATO[Math.min(nodo.nivel, 9)];
                const nb = document.createElement('span');
                nb.className = 'nivel-badge';
                nb.style.background = formato.color;
                nb.textContent = `N${Math.min(nodo.nivel, 9)}`;
                div.appendChild(nb);
                
                div.onclick = () => toggleSeleccion(nodo);
                
                cont.appendChild(div);
                
                if (expandidos.has(nodo.codigo) || filtroBusqueda) {
                    nodo.hijos.forEach(c => {
                        renderNodo(nodoIndex[c], profundidad + 1);
                    });
                }
            };
            
            raices.forEach(r => renderNodo(r, 0));
            
            actualizarContador();
        }

        function actualizarContador() {
            const set = new Set(seleccionadas);
            seleccionadas.forEach(cod => {
                let cur = nodoIndex[cod] ? nodoIndex[cod].padre : null;
                while (cur) {
                    set.add(cur);
                    cur = nodoIndex[cur] ? nodoIndex[cur].padre : null;
                }
            });
            
            document.getElementById('seleccionadas').textContent = set.size;
            document.getElementById('totalSelec').textContent = seleccionadas.size;
            document.getElementById('btnImportar').disabled = seleccionadas.size === 0;
        }

        async function importar() {
            const btn = document.getElementById('btnImportar');
            btn.disabled = true;
            btn.textContent = 'Insertando...';
            
            try {
                const setCompleto = new Set(seleccionadas);
                seleccionadas.forEach(cod => {
                    let cur = nodoIndex[cod] ? nodoIndex[cod].padre : null;
                    while (cur) {
                        setCompleto.add(cur);
                        cur = nodoIndex[cur] ? nodoIndex[cur].padre : null;
                    }
                });
                
                const codigos = Array.from(setCompleto).sort((a, b) => {
                    const partesA = a.replace(/^OE\./, '').split('.').map(p => parseInt(p) || 0);
                    const partesB = b.replace(/^OE\./, '').split('.').map(p => parseInt(p) || 0);
                    for (let i = 0; i < Math.max(partesA.length, partesB.length); i++) {
                        const va = partesA[i] || 0;
                        const vb = partesB[i] || 0;
                        if (va !== vb) return va - vb;
                    }
                    return 0;
                });
                
                let filaCursor = null;
                
                await Excel.run(async (context) => {
                    const sheet = context.workbook.worksheets.getActiveWorksheet();
                    const sel = context.workbook.getActiveCell();
                    sel.load('rowIndex');
                    await context.sync();
                    filaCursor = sel.rowIndex + 1;
                    
                    let r = filaCursor;
                    
                    for (const cod of codigos) {
                        const nodo = nodoIndex[cod];
                        if (!nodo) continue;
                        
                        const nivel = Math.min(nodo.nivel, 9);
                        const formato = NIVELES_FORMATO[nivel];
                        const codSinOE = cod.replace(/^OE\./, '');
                        
                        sheet.getRange(`B${r}`).values = [[`N${nivel}`]];
                        sheet.getRange(`C${r}`).values = [[codSinOE]];
                        sheet.getRange(`D${r}`).values = [[nodo.descripcion]];
                        if (nodo.unidad) {
                            sheet.getRange(`E${r}`).values = [[nodo.unidad]];
                        }
                        
                        const rangoCD = sheet.getRange(`C${r}:D${r}`);
                        rangoCD.format.font.color = formato.color;
                        rangoCD.format.font.size = formato.size;
                        rangoCD.format.font.bold = formato.bold;
                        rangoCD.format.font.italic = formato.italic;
                        
                        sheet.getRange(`C${r}`).format.horizontalAlignment = 'Left';
                        sheet.getRange(`D${r}`).format.horizontalAlignment = 'Left';
                        if (nodo.unidad) {
                            sheet.getRange(`E${r}`).format.horizontalAlignment = 'Center';
                        }
                        
                        sheet.getRange(`B${r}`).format.font.color = '#FFFFFF';
                        sheet.getRange(`B${r}`).format.font.size = 6;
                        
                        r++;
                    }
                    
                    sheet.getRange(`C${filaCursor}`).select();
                    await context.sync();
                });
                
                showToast(`✓ ${codigos.length} elementos insertados desde fila ${filaCursor}`);
                
                seleccionadas.clear();
                renderLista();
                
            } catch (err) {
                console.error(err);
                showToast('Error: ' + err.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Importar';
                actualizarContador();
            }
        }

        function showToast(msg, esError) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast' + (esError ? ' error visible' : ' visible');
            setTimeout(() => { t.classList.remove('visible'); }, 3500);
        }
    </script>
</body>
</html>
